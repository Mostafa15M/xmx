name: Crash Bot Monitor

on:
  schedule:
    - cron: '*/10 * * * *'   # ابدأ بـ 10 دقايق عشان تختبر براحة
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies & Playwright
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install-deps
        playwright install chromium --with-deps

    - name: Run Crash Bot
      run: python main.py

    - name: Commit updated CSV if changed
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add crash_odds_PRO.csv || true
        git commit -m "Update crash odds history [auto]" || echo "No changes"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
