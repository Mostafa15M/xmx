name: Crash WSS Telegram Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *" # كل 30 دقيقة لإعادة تشغيل البوت

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python bot.py

      - name: Run analyzer
        run: python analyzer.py
