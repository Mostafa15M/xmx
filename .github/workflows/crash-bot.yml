name: Crash Bot - Run Script

on:
  # شغل كل ما تعمل push أو pull request على الـ main
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  
  # شغل يدوي (manual trigger) من Actions tab
  workflow_dispatch:
  
  # شغل تلقائي كل 30 دقيقة (مثال) - غير الـ cron حسب احتياجك
  schedule:
    - cron: '*/30 * * * *'   # كل 30 دقيقة

jobs:
  run-bot:
    runs-on: ubuntu-latest   # أفضل لـ Playwright (يدعم الـ dependencies كويس)

    timeout-minutes: 20      # لو طال أكتر من 20 دقيقة يلغي الـ job

    steps:
      # 1. جيب الكود من الـ repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. ركب Python (نسخة 3.11 أو 3.12 كويسة مع Playwright)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. ركب الـ dependencies العادية من requirements.txt (لو عندك ملف)
      # لو مفيش requirements.txt، ممكن تضيف pip install مباشرة تحت
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright opencv-python-headless easyocr numpy scipy requests pandas matplotlib
          # أضف أي حاجة تانية زي torch لو محتاجها، بس احذر من الحجم

      # 4. ركب browsers و dependencies نظام التشغيل اللي Playwright محتاجها
      - name: Install Playwright browsers and system deps
        run: |
          playwright install --with-deps chromium
          # --with-deps بيركب كل الـ libs اللي ممكن تحتاجها (libnss3, libatk, ffmpeg, etc.)

      # 5. شغل السكريبت الرئيسي (غير main.py لاسم ملفك الفعلي)
      - name: Run Crash Bot script
        run: python main.py
        # لو عايز تمرر متغيرات بيئية (مثل TELEGRAM_TOKEN):
        # env:
        #   TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        #   CHAT_ID: ${{ secrets.CHAT_ID }}

      # 6. (اختياري) لو عايز تحفظ screenshots أو logs كـ artifacts
      - name: Upload screenshots and logs (if any)
        if: always()   # حتى لو فشل الـ job
        uses: actions/upload-artifact@v4
        with:
          name: crash-bot-output
          path: |
            *.png
            crash_odds_PRO.csv
            debug_*.png
          retention-days: 7
