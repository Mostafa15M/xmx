name: Crash Bot Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # كل 5 دقايق - غيره لـ */3 أو */10 حسب احتياجك
  workflow_dispatch:        # تشغيل يدوي من Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10     # عشان ما يتجاوزش limits

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies for Playwright + OpenCV
      run: |
        sudo apt-get update
        sudo apt-get install -y libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1 libasound2 fonts-liberation libatk1.0-0 libatspi2.0-0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libpango-1.0-0 libcairo2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 libpangoft2-1.0-0 libpixman-1-0 libpng16-16 libstdc++6 libuuid1 libwayland-client0 libx11-6 libxcb1 libxext6 libxrender1 zlib1g tesseract-ocr libtesseract-dev libleptonica-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m playwright install --with-deps chromium

    - name: Run Crash Bot
      run: python main.py

    - name: Commit updated CSV if changed
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add crash_odds_PRO.csv || true
        git commit -m "Update crash odds history [auto]" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
