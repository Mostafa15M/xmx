name: Crash WSS Telegram Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *" # كل 30 دقيقة لإعادة تشغيل البوت

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10  # تم تحديث النسخة هنا

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4️⃣ Run bot
      - name: Run bot
        run: python bot.py

      # 5️⃣ Run analyzer
      - name: Run analyzer
        run: python analyzer.py
